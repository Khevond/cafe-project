<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tinos:wght@400;700&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронь столика</title>
</head>
<body>

<!-- HEADER -->
<div class="menu-page-header">
    <div class="container">

        <div class='header-line'>
            <div class='header-logo'>
                <a href="index.html">
                    <img src="logo.png" alt="">
                </a>
            </div>

            <div class='nav'>
                <a class='nav-item' href="index.html">ГЛАВНАЯ</a>
                <a class='nav-item' href="menu.html">МЕНЮ</a>
                <a class='nav-item' href="about.html">О НАС</a>
                <a class='nav-item' href="booking.html">БРОНЬ</a>
            </div>
            <div class='phone'>
                <div class='phone-holder'>
                    <img src="phone.png" alt="">
                    <div class='number'>
                        <a class='num' href='#'>+7 951-532-40-79</a>
                    </div>
                </div>

                <div class='phone-text'>
                    Свяжитесь с нами для <br> бронирования
                </div>
            </div>

            <div class='btn'>
                <a class='button' href='#'>ЗАКАЗ СТОЛИКА</a>
            </div>
        </div>

        <div class="menu-page-hero">
            <div class="menu-page-title">
                Бронь <span>Столика</span>
            </div>

            <div class="menu-page-subtitle">
                Забронируйте стол заранее
            </div>
        </div>

    </div>
</div>

<!-- FORM -->
<div class="booking-section">
    <div class="container">

        <div class="booking-form-wrapper">

            <div class="section-title">
                Оставьте <span>заявку</span>
            </div>

            <form class="booking-form" id="bookingForm">

                <div class="form-row">
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="tel" placeholder="Телефон" required>
                </div>

                <div class="form-row">
                    <input type="date" required>
                    <input type="time" required>
                </div>

                <div class="form-row">
                    <select required>
                        <option value="">Количество гостей</option>
                        <option>1 человек</option>
                        <option>2 человека</option>
                        <option>3-4 человека</option>
                        <option>5-6 человек</option>
                        <option>7+</option>
                    </select>

                    <select required>
                        <option value="">Зона</option>
                        <option>В зале</option>
                        <option>У окна</option>
                        <option>На террасе</option>
                    </select>
                </div>

                <textarea placeholder="Комментарий (необязательно)"></textarea>

                <button type="submit" class="booking-btn">
                    ЗАБРОНИРОВАТЬ
                </button>

            </form>

            <div id="successMessage" class="success-message">
                ✅ Ваша заявка отправлена!
            </div>

        </div>

    </div>
</div>

<!-- CTA -->
<div class="menu-order-block">
    <div class="container">
        <div class="menu-order-content">
            <div>
                <div class="menu-order-title">Ждём вас!</div>
                <div class="menu-order-text">Мы подготовим лучший столик для вас</div>
            </div>

            <a href="menu.html" class="menu-order-btn">ПОСМОТРЕТЬ МЕНЮ</a>
        </div>
    </div>
</div>

<div class="footer">
    Project MTUCI 2026
</div>

<script>
const form = document.getElementById('bookingForm');
const message = document.getElementById('successMessage');

form.addEventListener('submit', function(e) {
    e.preventDefault();
    message.style.display = 'block';
    form.reset();
});
</script>

</body>
</html>
